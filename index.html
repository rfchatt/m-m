<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M&M MOBILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/air-datepicker/2.2.3/css/datepicker.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>

:root {
  --bg:          #0f0f13;
  --surface:     #17171d;
  --surface-2:   #1f1f28;
  --surface-3:   #27272f;
  --border:      rgba(255,255,255,0.07);
  --border-hover:rgba(255,255,255,0.15);

  --accent:      #f97316;
  --accent-dim:  rgba(249,115,22,0.12);
  --accent-glow: rgba(249,115,22,0.3);

  --blue:        #3b82f6;
  --blue-dim:    rgba(59,130,246,0.12);
  --green:       #22c55e;
  --green-dim:   rgba(34,197,94,0.12);
  --purple:      #a855f7;
  --purple-dim:  rgba(168,85,247,0.12);
  --red:         #ef4444;
  --red-dim:     rgba(239,68,68,0.12);
  --amber:       #f59e0b;
  --amber-dim:   rgba(245,158,11,0.12);

  --text-1:      #f0f0f4;
  --text-2:      #9999ac;
  --text-3:      #55555f;

  --radius-sm:   6px;
  --radius:      12px;
  --radius-lg:   18px;
  --radius-xl:   24px;

  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:   0 12px 48px rgba(0,0,0,0.6);

    --font-display: 'Cairo', sans-serif;
  --font-body:    'Tajawal', sans-serif;

  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  font-size: 15px;
  background-color: var(--bg);
  background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(249,115,22,0.08) 0%, transparent 60%);
  color: var(--text-1);
  max-width: 1040px;
  margin: 0 auto;
  padding: 0 20px 60px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,15,19,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  text-align: center;
  padding: 18px 20px 14px;
  margin: 0 -20px;
}

.header h2 {
  font-family: var(--font-display);
  font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--accent) 0%, #fbbf24 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  display: inline-block;
}

.current-date {
  font-size: 0.78rem; color: var(--text-3);
  letter-spacing: 0.06em; text-transform: uppercase; margin-top: 4px; font-weight: 500;
}

.day-navigation {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  margin: 24px 0 20px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 14px 18px; border-radius: var(--radius-lg); box-shadow: var(--shadow);
}

.day-info {
  font-family: var(--font-display); font-size: 1.05rem; font-weight: 600;
  text-align: center; flex-grow: 1; min-width: 0; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; color: var(--text-1);
}

.today-highlight { color: var(--accent) !important; }

.datepicker-container {
  position: relative; display: flex; align-items: center;
  flex-grow: 1; justify-content: center; min-width: 0;
}

.datepicker { position: absolute; z-index: 1000; top: 100%; left: 0; }

button {
  font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
  padding: 9px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  white-space: nowrap; transition: all var(--transition);
  letter-spacing: 0.01em; line-height: 1; width: auto;
}

button:hover { opacity: 1; transform: translateY(-1px); filter: brightness(1.1); }
button:active { transform: translateY(0); }

.nav-button {
  background: var(--surface-2); color: var(--text-1);
  border: 1px solid var(--border); padding: 9px 14px;
}
.nav-button:hover { background: var(--surface-3); border-color: var(--border-hover); }

.calendar-button {
  background: var(--green-dim); color: var(--green);
  border: 1px solid rgba(34,197,94,0.2); margin-left: 8px; margin-right: 8px;
}
.calendar-button:hover { background: rgba(34,197,94,0.2); }

.btn-success {
  background: var(--green); color: #fff; font-weight: 600;
  width: 100%; padding: 11px; border-radius: var(--radius-sm);
  box-shadow: 0 0 20px rgba(34,197,94,0.2);
}
.btn-success:hover { box-shadow: 0 0 28px rgba(34,197,94,0.35); }

.btn-danger {
  background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.2);
}
.btn-warning {
  background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.2);
}

.btn-info {
  background: var(--blue); color: #fff; font-weight: 600;
  width: 100%; padding: 11px; border-radius: var(--radius-sm);
  box-shadow: 0 0 20px rgba(59,130,246,0.2);
}
.btn-info:hover { box-shadow: 0 0 28px rgba(59,130,246,0.35); }

.btn-pdf {
  background: linear-gradient(135deg, var(--accent), #dc2626);
  color: #fff; font-weight: 600; padding: 12px 28px;
  border-radius: var(--radius-sm); box-shadow: 0 0 24px var(--accent-glow);
  font-size: 0.95rem; width: auto;
}
.btn-pdf:hover { box-shadow: 0 0 36px var(--accent-glow); }

.tabs {
  display: flex; gap: 4px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 5px; border-radius: var(--radius) var(--radius) 0 0; border-bottom: none;
}

.tab {
  flex: 1; text-align: center; padding: 10px 16px; cursor: pointer;
  font-family: var(--font-display); font-size: 0.9rem; font-weight: 600;
  color: var(--text-2); border-radius: var(--radius-sm);
  transition: all var(--transition); letter-spacing: 0.02em;
  border: 1px solid transparent; background: transparent; width: auto;
}
.tab:hover { color: var(--text-1); background: var(--surface-2); transform: none; filter: none; }
.tab.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(249,115,22,0.25); }

.tab-content {
  display: none;
  background: var(--surface); border: 1px solid var(--border); border-top: none;
  padding: 24px; border-radius: 0 0 var(--radius) var(--radius);
  margin-bottom: 20px; animation: fadeIn 0.25s ease;
}
.tab-content.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.form-container { margin-bottom: 20px; }
.form-row { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 200px; }

label {
  display: block; margin-bottom: 6px; font-size: 0.82rem; font-weight: 500;
  color: var(--text-2); letter-spacing: 0.03em; text-transform: uppercase;
}

input, select {
  font-family: var(--font-body); font-size: 0.95rem;
  padding: 10px 13px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface-2);
  color: var(--text-1); width: 100%; box-sizing: border-box;
  transition: border-color var(--transition), box-shadow var(--transition); outline: none;
}
input::placeholder { color: var(--text-3); }
input:focus, select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim);
}
input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }

.item-list {
  margin-top: 20px; max-height: 320px; overflow-y: auto;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  scrollbar-width: thin; scrollbar-color: var(--surface-3) transparent;
}
.item-list::-webkit-scrollbar { width: 5px; }
.item-list::-webkit-scrollbar-track { background: transparent; }
.item-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }

.item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 16px; border-bottom: 1px solid var(--border); gap: 14px;
  transition: background var(--transition);
}
.item:hover { background: var(--surface-2); }
.item:last-child { border-bottom: none; }
.item-info { flex-grow: 1; min-width: 0; }
.item-name { font-weight: 600; font-size: 0.92rem; margin-bottom: 3px; color: var(--text-1); }
.item-details { color: var(--text-2); font-size: 0.82rem; }
.item-actions { display: flex; gap: 8px; flex-shrink: 0; }

.badge {
  padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 4px; margin-left: 10px;
}
.badge-paid { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
.badge-pending { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }
.empty-state i { font-size: 2.4em; margin-bottom: 12px; display: block; opacity: 0.4; }
.empty-state p { font-size: 0.9rem; }

footer {
  background: var(--surface); border: 1px solid var(--border);
  padding: 24px; border-radius: var(--radius-lg); margin-top: auto; margin-bottom: 24px;
}

.stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 20px;
}

.stat-item {
  background: var(--surface-2); border: 1px solid var(--border);
  padding: 18px 16px; border-radius: var(--radius); text-align: center;
  transition: border-color var(--transition), transform var(--transition);
}
.stat-item:hover { border-color: var(--border-hover); transform: translateY(-2px); }
.stat-item:nth-child(1) { border-top: 3px solid var(--green); }
.stat-item:nth-child(2) { border-top: 3px solid var(--purple); }
.stat-item:nth-child(3) { border-top: 3px solid var(--red); }

.stat-label {
  font-size: 0.75rem; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: 8px;
}
.stat-value { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--text-1); }
.stat-item:nth-child(1) .stat-value { color: var(--green); }
.stat-item:nth-child(2) .stat-value { color: var(--purple); }
.stat-item:nth-child(3) .stat-value { color: var(--red); }

.backup-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.pdf-button-container { text-align: center; margin-bottom: 14px; }

#backupStatus {
  margin-top: 10px; padding: 10px 14px; border-radius: var(--radius-sm);
  background: var(--surface-2); border-left: 3px solid var(--blue);
  font-size: 0.82rem; color: var(--text-2); font-style: italic;
}

.section {
  background: var(--surface); border: 1px solid var(--border);
  padding: 28px; border-radius: var(--radius-lg); margin-bottom: 24px;
  animation: fadeIn 0.3s ease;
}

.section-title {
  font-family: var(--font-display); font-size: 1.15rem; font-weight: 700;
  color: var(--text-1); margin-bottom: 24px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border); letter-spacing: -0.01em;
}

#inwiRecharge:focus, #remainingInwi:focus {
  border-color: #9f339f; box-shadow: 0 0 0 3px rgba(159,51,159,0.12);
}
#orangeRecharge:focus, #remainingOrange:focus {
  border-color: #ea7c08; box-shadow: 0 0 0 3px rgba(234,124,8,0.12);
}
#iamRecharge:focus, #remainingIAM:focus {
  border-color: var(--red); box-shadow: 0 0 0 3px rgba(2,2,187,0.12);
}

#totalDealersToday {
  font-family: var(--font-display); font-size: 0.95rem; font-weight: 600;
  color: var(--green) !important; background: var(--green-dim);
  border: 1px solid rgba(34,197,94,0.2); border-radius: var(--radius-sm);
  padding: 10px 14px; display: inline-block; width: 100%; margin-top: 4px;
}

.result {
  background: var(--surface-2); border: 1px solid var(--border);
  border-left: 4px solid var(--accent); border-radius: var(--radius-sm);
  padding: 18px 20px; margin-top: 20px;
}
.result h3 {
  font-family: var(--font-display); font-size: 1rem; font-weight: 600;
  color: var(--text-2); margin: 0;
}
#marginResult {
  font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; color: var(--green);
}

.section > div[style*="text-align: center"] {
  margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);
  color: var(--text-3); font-size: 0.8rem;
}
.section > div[style*="text-align: center"] a {
  color: var(--accent); text-decoration: none; font-weight: 600;
}
.section > div[style*="text-align: center"] a:hover { text-decoration: underline; }

@media (max-width: 768px) {
  body { padding: 0 14px 48px; }
  .header { margin: 0 -14px; padding: 14px; }
  .header h2 { font-size: 1.4rem; }
  .day-navigation { flex-direction: column; align-items: stretch; gap: 10px; padding: 14px; }
  .day-info { text-align: center; white-space: normal; }
  .datepicker-container { margin: 0; justify-content: center; }
  .nav-button { width: 100%; justify-content: center; }
  .form-group { min-width: 100%; }
  .item { flex-direction: column; align-items: flex-start; gap: 10px; }
  .item-actions { width: 100%; justify-content: flex-end; }
  .stats { grid-template-columns: 1fr; }
  .section { padding: 20px 16px; }
  .tab-content { padding: 18px 16px; }
}
@media (max-width: 480px) { .btn-pdf { width: 100%; } }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>M&M Mobile</h2>
      <div class="current-date" id="currentDate"></div>
    </div>

    <div class="day-navigation" style="position: sticky; top: 130px; z-index: 90; background: rgba(15,15,19,0.85)">
      <button class="nav-button" onclick="changeDay(-1)">
        <i class="fas fa-chevron-left"></i> اليوم السابق
      </button>
      <div class="datepicker-container">
        <span class="day-info" id="currentDayDisplay"></span>
        <button class="calendar-button" id="calendarTrigger">
          <i class="fas fa-calendar-alt"></i> تغيير اليوم
        </button>
        <input type="text" class="datepicker" id="datepicker" style="display: none" />
      </div>
      <button class="nav-button" onclick="changeDay(1)">
        اليوم التالي <i class="fas fa-chevron-right"></i>
      </button>
    </div>

    <div class="tabs">
      <div class="tab" data-tab="credits">الكريديات</div>
      <div class="tab active" data-tab="sales">المبيعات</div>
    </div>

    <!-- Ventes Tab -->
    <div id="sales" class="tab-content active">
      <div class="form-container">
        <form id="productForm">
          <div class="form-row">
            <div class="form-group">
              <label for="productPrice" style="direction: rtl;">السعر (DH)</label>
              <input type="number" id="productPrice" placeholder="أدخل السعر" min="0" step="1.0"  style="direction: rtl;" required/>
            </div>
            <div class="form-group">
              <label for="productName" style="direction: rtl;">إسم المنتج</label>
              <input type="text" id="productName" placeholder="أدخل اسم المنتج" style="direction: rtl;" required />
            </div>
          </div>
          <button type="submit" class="btn-success"><i class="fas fa-plus"></i>أضف منتج مباع</button>
        </form>
      </div>
      <div class="item-list" id="productList">
        <div class="empty-state">
          <i class="fas fa-box-open"></i>
        </div>
      </div>
    </div>

    <!-- Crédits Tab -->
    <div id="credits" class="tab-content">
      <div class="form-container">
        <form id="creditForm">
          <div class="form-row">
            <div class="form-group">
              <label for="creditAmount" style="direction: rtl;">المبلغ (DH)</label>
              <input type="number" id="creditAmount" placeholder="أدخل المبلغ" min="0" step="1.0" required  style="direction: rtl;"/>
            </div>
            <div class="form-group">
              <label for="creditType" style="direction: rtl;" style="direction: rtl;">نوع الكريدي</label>
              <input type="text" id="creditType" placeholder="أدخل نوع الكريدي" style="direction: rtl;" required />
            </div>
            <div class="form-group">
              <label for="borrowerName" style="direction: rtl;">إسم صاحب الكريدي</label>
              <input type="text" id="borrowerName" placeholder="أدخل اسم صاحب الكريدي" style="direction: rtl;" required />
            </div>
          </div>
          <button type="submit" class="btn-success"><i class="fas fa-save"></i> حفظ الكريدي</button>
        </form>
      </div>
      <div class="item-list" id="creditList">
        <div class="empty-state">
          <i class="fas fa-hand-holding-usd"></i>
        </div>
      </div>
    </div>

    <footer>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-label">مجموع المبيعات</div>
          <div class="stat-value" id="totalSales">0.00 DH</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">مجموع الكريديات</div>
          <div class="stat-value" id="totalCredits">0.00 DH</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">الكريديات الغير مدفوعة</div>
          <div class="stat-value" id="pendingCredits">0.00 DH</div>
        </div>
      </div>
      <div class="backup-section">
        <div class="pdf-button-container">
          <button onclick="exportToPDF()" class="btn-pdf">
            <i class="fas fa-file-pdf"></i> حفظ في ملف PDF
          </button>
        </div>
        <div id="backupStatus" style="direction: rtl;">جاهز لإنشاء الملف</div>
      </div>
    </footer>

    <div class="section">
      <h2 class="section-title" style="direction: rtl;">حساب هامش اليوم</h2>
      <div class="form-container">
        <form id="marginForm">
          <div class="form-row">
            <div class="form-group">
              <label for="yesterdayCash" style="direction: rtl;">(لاكيس) البارح</label>
              <input type="number" id="yesterdayCash" placeholder="Montant" min="0" value="707" style="direction: rtl;"/>
            </div>
            <div class="form-group">
              <label for="todayCash" style="direction: rtl;">(لاكيس) اليوم</label>
              <input type="number" id="todayCash" placeholder="Montant" min="0" value="345" style="direction: rtl;"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="yesterdayDeler" style="direction: rtl;">مجموع الديليرات البارح</label>
              <input type="number" id="yesterdayDeler" placeholder="Montant" min="0" value="293" style="direction: rtl;"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="inwiRecharge" style="color: #9f339f;  direction: rtl;">مبلغ تعبئة الديلر اليوم &nbsp;<a href="https://www.inwi.ma/" target="_blank"><img src="Images/inwi.png" width="40px" style="vertical-align:middle"></a></label>
              <input type="number" id="inwiRecharge" placeholder="Montant" min="0" value="221" class="recharge-input" style="direction: rtl;"/>
            </div>
            <div class="form-group">
              <label for="orangeRecharge" style="color: rgb(234, 124, 8);  direction: rtl;">مبلغ تعبئة الديلر اليوم &nbsp;<a href="https://www.orange.ma/" target="_blank"><img src="Images/orange.png" width="30px" style="vertical-align:middle"></a></label>
              <input type="number" id="orangeRecharge" placeholder="Montant" min="0" value="23" class="recharge-input" style="direction: rtl;"/>
            </div>
            <div class="form-group">
              <label for="iamRecharge" style="color: var(--red);  direction: rtl;">مبلغ تعبئة الديلر اليوم &nbsp;<a href="https://www.iam.ma/" target="_blank"><img src="Images/iam.png" width="26px" style="vertical-align:middle"></a></label>
              <input type="number" id="iamRecharge" placeholder="Montant" min="0" value="3123" class="recharge-input" style="direction: rtl;"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="remainingInwi" style="color: #9f339f;  direction: rtl;"> المبلغ الباقي في الديلر اليوم&nbsp;<a href="https://www.inwi.ma/" target="_blank"><img src="Images/inwi.png" width="30px" style="vertical-align:middle"></a></label>
              <input type="number" id="remainingInwi" placeholder="Montant" min="0" style="direction: rtl;"/>
            </div>
            <div class="form-group">
              <label for="remainingOrange" style="color: rgb(234, 124, 8);  direction: rtl;">المبلغ الباقي في الديلر اليوم&nbsp;<a href="https://www.orange.ma/" target="_blank"><img src="Images/orange.png" width="30px" style="vertical-align:middle"></a></label>
              <input type="number" id="remainingOrange" placeholder="Montant" min="0" style="direction: rtl;"/>
            </div>
            <div class="form-group">
              <label for="remainingIAM" style="color: var(--red); direction: rtl;">المبلغ الباقي في الديلر اليوم&nbsp;<a href="https://www.iam.ma/" target="_blank"><img src="Images/iam.png" width="30px" style="vertical-align:middle"></a></label>
              <input type="number" id="remainingIAM" placeholder="Montant" min="0" style="direction: rtl;"/>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 14px;">
            <p id="totalDealersToday" style="direction: rtl;">مجموع الباقي في الديلرات اليوم</p>
          </div>
          <div class="form-group" style="margin-bottom: 20px;">
            <label for="remainingCashe" style="direction: rtl;">الكاش المتبقي (DH)</label>
            <input type="number" id="remainingCashe" placeholder="Montant" min="0" style="direction: rtl;"/>
          </div>

          <button style="background-color: var(--green);" type="button" onclick="calculateMargin()" class="btn-info">
            <i class="fas fa-calculator"></i> حساب الهامش
          </button>

          <div class="result">
            <h3 style="direction: rtl;">الهامش<br><span id="marginResult">0.00 DH</span></h3>
          </div>
        </form>
      </div>

    <!-- All original JavaScript preserved exactly -->
    <script>
      let allData = JSON.parse(localStorage.getItem("commercialData")) || {};

      function calculateMargin() {
        const yesterdayCash = parseFloat(document.getElementById("yesterdayCash").value) || 0;
        const todayCash = parseFloat(document.getElementById("todayCash").value) || 0;
        const yesterdayDeler = parseFloat(document.getElementById("yesterdayDeler").value) || 0;
        const inwiRecharge = parseFloat(document.getElementById("inwiRecharge").value) || 0;
        const orangeRecharge = parseFloat(document.getElementById("orangeRecharge").value) || 0;
        const iamRecharge = parseFloat(document.getElementById("iamRecharge").value) || 0;
        const totalRecharges = inwiRecharge + orangeRecharge + iamRecharge;
        const remainingInwi = parseFloat(document.getElementById("remainingInwi").value) || 0;
        const remainingOrange = parseFloat(document.getElementById("remainingOrange").value) || 0;
        const remainingIAM = parseFloat(document.getElementById("remainingIAM").value) || 0;
        const totalRemaining = remainingInwi + remainingOrange + remainingIAM;
        const remainingCashe = parseFloat(document.getElementById("remainingCashe").value) || 0;
        const totalSales = parseFloat(document.getElementById("totalSales").textContent.replace(" DH", "")) || 0;
        const pendingCredits = parseFloat(document.getElementById("pendingCredits").textContent.replace(" DH", "")) || 0;
        const totalDealersToday = remainingInwi + remainingOrange + remainingIAM;
        document.getElementById("totalDealersToday").textContent = `مجموع الباقي في الديلرات اليوم : ${totalDealersToday.toFixed(2)} DH`;
        const margin = -1 * (yesterdayDeler + totalRecharges - totalRemaining + totalSales - pendingCredits - todayCash + yesterdayCash) + remainingCashe;
        const marginResult = document.getElementById("marginResult");
        marginResult.textContent = margin.toFixed(2) + " DH";
        marginResult.style.color = margin < 0 ? "var(--red)" : "var(--green)";
        const dateKey = formatDate(currentDate);
        if (!allData[dateKey]) allData[dateKey] = { products: [], credits: [] };
        allData[dateKey].marginData = { yesterdayCash, todayCash, yesterdayDeler, recharges: { inwi: inwiRecharge, orange: orangeRecharge, iam: iamRecharge, total: totalRecharges }, remaining: { inwi: remainingInwi, orange: remainingOrange, iam: remainingIAM, total: totalRemaining, cashe: remainingCashe }, totalSales, pendingCredits, margin, totalDealersToday };
        localStorage.setItem("commercialData", JSON.stringify(allData));
        document.getElementById("backupStatus").textContent = "Données mises à jour - " + new Date().toLocaleTimeString();
        return margin;
      }

      function saveMarginInputs() {
        const dateKey = formatDate(currentDate);
        if (!allData[dateKey]) allData[dateKey] = { products: [], credits: [], marginData: null };
        const existingCalculation = allData[dateKey].marginData?.margin || 0;
        const existingDealersTotal = allData[dateKey].marginData?.totalDealersToday || 0;
        allData[dateKey].marginData = {
          yesterdayCash: parseFloat(document.getElementById("yesterdayCash").value) || 0,
          todayCash: parseFloat(document.getElementById("todayCash").value) || 0,
          yesterdayDeler: parseFloat(document.getElementById("yesterdayDeler").value) || 0,
          recharges: { inwi: parseFloat(document.getElementById("inwiRecharge").value) || 0, orange: parseFloat(document.getElementById("orangeRecharge").value) || 0, iam: parseFloat(document.getElementById("iamRecharge").value) || 0, total: 0 },
          remaining: { inwi: parseFloat(document.getElementById("remainingInwi").value) || 0, orange: parseFloat(document.getElementById("remainingOrange").value) || 0, iam: parseFloat(document.getElementById("remainingIAM").value) || 0, cashe: parseFloat(document.getElementById("remainingCashe").value) || 0, total: 0 },
          margin: existingCalculation, totalDealersToday: existingDealersTotal,
          totalSales: parseFloat(document.getElementById("totalSales").textContent.replace(" DH", "")) || 0,
          pendingCredits: parseFloat(document.getElementById("pendingCredits").textContent.replace(" DH", "")) || 0,
          lastUpdated: new Date().toISOString()
        };
        allData[dateKey].marginData.recharges.total = allData[dateKey].marginData.recharges.inwi + allData[dateKey].marginData.recharges.orange + allData[dateKey].marginData.recharges.iam;
        allData[dateKey].marginData.remaining.total = allData[dateKey].marginData.remaining.inwi + allData[dateKey].marginData.remaining.orange + allData[dateKey].marginData.remaining.iam;
        localStorage.setItem("commercialData", JSON.stringify(allData));
        return allData[dateKey].marginData;
      }

      function setupMarginInputListeners() {
        const marginInputIds = ["yesterdayCash","todayCash","yesterdayDeler","inwiRecharge","orangeRecharge","iamRecharge","remainingInwi","remainingOrange","remainingIAM","remainingCashe"];
        marginInputIds.forEach(id => {
          const input = document.getElementById(id);
          if (input) {
            input.addEventListener('change', handleMarginInputChange);
            input.addEventListener('blur', handleMarginInputChange);
            if (id.startsWith('remaining')) input.addEventListener('input', updateDealersTotal);
          }
        });
      }

      function handleMarginInputChange() { saveMarginInputs(); showAutoSaveNotification(); }

      function updateDealersTotal() {
        const total = (parseFloat(document.getElementById("remainingInwi").value || 0) + parseFloat(document.getElementById("remainingOrange").value || 0) + parseFloat(document.getElementById("remainingIAM").value || 0));
        document.getElementById("totalDealersToday").textContent = `Total de Reste des 3 Dealers : ${total.toFixed(2)} DH`;
      }

      function showAutoSaveNotification() {
        const status = document.getElementById("backupStatus");
        const originalText = status.textContent;
        status.textContent = "Sauvegarde automatique réussie - " + new Date().toLocaleTimeString();
        status.style.color = "#22c55e";
        setTimeout(() => { status.textContent = originalText; status.style.color = ""; }, 2000);
      }

      function setupFormEventListeners() {
        document.getElementById("productForm").addEventListener("submit", function(e) {
          e.preventDefault();
          const productName = document.getElementById("productName").value.trim();
          const productPrice = parseFloat(document.getElementById("productPrice").value);
          if (productName && !isNaN(productPrice)) {
            products.push({ id: Date.now(), name: productName, price: productPrice.toFixed(2), sold: true, date: currentDate.toISOString() });
            saveData(); renderProducts(); updateStats(); this.reset();
          }
        });
        document.getElementById("creditForm").addEventListener("submit", function(e) {
          e.preventDefault();
          const borrowerName = document.getElementById("borrowerName").value.trim();
          const creditType = document.getElementById("creditType").value.trim();
          const creditAmount = parseFloat(document.getElementById("creditAmount").value);
          if (borrowerName && creditType && !isNaN(creditAmount)) {
            credits.push({ id: Date.now(), borrower: borrowerName, type: creditType, amount: creditAmount.toFixed(2), paid: false, date: currentDate.toISOString() });
            saveData(); renderCredits(); updateStats(); this.reset();
          }
        });
      }

      function setupTabEventListeners() {
        const tabs = document.querySelectorAll(".tab");
        tabs.forEach(tab => {
          tab.addEventListener("click", () => {
            tabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.getElementById(tab.dataset.tab).classList.add("active");
          });
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        currentDate = new Date(); currentDate.setHours(0,0,0,0);
        allData = JSON.parse(localStorage.getItem("commercialData")) || {};
        setupFormEventListeners(); setupTabEventListeners(); setupMarginInputListeners();
        loadDayData(currentDate);
        $("#datepicker").datepicker({ language: "fr", autoClose: true, dateFormat: "dd-mm-yyyy", onSelect: function(formattedDate) {
          const parts = formattedDate.split("-"); const selectedDate = new Date(parts[2], parts[1]-1, parts[0]); loadDayData(selectedDate);
        }});
      });

      function loadMarginData() {
        const dateKey = formatDate(currentDate);
        if (!allData[dateKey] || !allData[dateKey].marginData) return;
        const marginData = allData[dateKey].marginData;
        const updateIfEmpty = (id, value) => { const el = document.getElementById(id); if (el && (!el.value || el.value === "0") && value !== undefined) el.value = value; };
        updateIfEmpty("yesterdayCash", marginData.yesterdayCash); updateIfEmpty("todayCash", marginData.todayCash); updateIfEmpty("yesterdayDeler", marginData.yesterdayDeler);
        updateIfEmpty("inwiRecharge", marginData.recharges?.inwi); updateIfEmpty("orangeRecharge", marginData.recharges?.orange); updateIfEmpty("iamRecharge", marginData.recharges?.iam);
        updateIfEmpty("remainingInwi", marginData.remaining?.inwi); updateIfEmpty("remainingOrange", marginData.remaining?.orange); updateIfEmpty("remainingIAM", marginData.remaining?.iam); updateIfEmpty("remainingCashe", marginData.remaining?.cashe);
        if (marginData.margin !== undefined) document.getElementById("marginResult").textContent = marginData.margin.toFixed(2) + " DH";
      }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/air-datepicker/2.2.3/js/datepicker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/air-datepicker/2.2.3/js/i18n/datepicker.fr.min.js"></script>

    <script>
      const { jsPDF } = window.jspdf;
      let currentDate = new Date(); currentDate.setHours(0,0,0,0);
      let products = []; let credits = [];

      function formatDate(date) { const d = String(date.getDate()).padStart(2,"0"); const m = String(date.getMonth()+1).padStart(2,"0"); return `${d}-${m}-${date.getFullYear()}`; }
      function formatDateForDisplay(date) { return date.toLocaleDateString("fr-FR", { weekday:"long", year:"numeric", month:"long", day:"numeric" }); }

      function resetMarginInputs() {
        ["yesterdayCash","todayCash","yesterdayDeler","inwiRecharge","orangeRecharge","iamRecharge","remainingInwi","remainingOrange","remainingIAM","remainingCashe"].forEach(id => document.getElementById(id).value = "");
        document.getElementById("marginResult").textContent = "0.00 DH";
      }

      const datepicker = $("#datepicker").datepicker({ language:"fr", autoClose:true, dateFormat:"dd-mm-yyyy", onSelect: function(fd) {
        const p = fd.split("-"); const sd = new Date(p[2],p[1]-1,p[0]); sd.setHours(0,0,0,0); loadDayData(sd);
      }});

      $("#calendarTrigger").click(function() { datepicker.data("datepicker").show(); });

      function loadDayData(date) {
        currentDate = date; updateDateDisplay();
        const dateKey = formatDate(date);
        if (!allData[dateKey]) allData[dateKey] = { products:[], credits:[], marginData:null };
        resetMarginInputs();
        products = allData[dateKey].products || []; credits = allData[dateKey].credits || [];
        renderProducts(); renderCredits(); updateStats(); loadMarginData();
      }

      function changeDay(days) { saveMarginInputs(); const nd = new Date(currentDate); nd.setDate(nd.getDate()+days); loadDayData(nd); }

      function updateDateDisplay() {
        const today = new Date(); today.setHours(0,0,0,0);
        const dd = document.getElementById("currentDayDisplay"); dd.textContent = formatDateForDisplay(currentDate);
        document.getElementById("currentDate").textContent = "Système: " + formatDate(currentDate);
        currentDate.getTime() === today.getTime() ? dd.classList.add("today-highlight") : dd.classList.remove("today-highlight");
      }

      function saveData() {
        const dateKey = formatDate(currentDate);
        const currentMarginData = allData[dateKey]?.marginData || null;
        allData[dateKey] = { products, credits, marginData: currentMarginData };
        localStorage.setItem("commercialData", JSON.stringify(allData));
        document.getElementById("backupStatus").textContent = "Données mises à jour - " + new Date().toLocaleTimeString();
      }

      document.addEventListener("click", function(e) {
        if (e.target.tagName === "BUTTON" || e.target.closest("button")) {
          const btn = e.target.tagName === "BUTTON" ? e.target : e.target.closest("button");
          const id = parseInt(btn.dataset.id); const type = btn.dataset.type; const action = btn.dataset.action;
          if (type === "product") deleteProduct(id);
          else if (type === "credit") { if (action === "toggle") toggleCreditStatus(id); else if (action === "delete") deleteCredit(id); }
        }
      });

      function deleteProduct(id) { if (confirm("حذف هذا المنتج ?")) { products = products.filter(p => p.id !== id); saveData(); renderProducts(); updateStats(); } }
      function toggleCreditStatus(id) { credits = credits.map(c => c.id === id ? {...c, paid: !c.paid} : c); saveData(); renderCredits(); updateStats(); }
      function deleteCredit(id) { if (confirm("حذف هذا الكريدي ?")) { credits = credits.filter(c => c.id !== id); saveData(); renderCredits(); updateStats(); } }

      function renderProducts() {
        const pl = document.getElementById("productList");
        if (!products.length) { pl.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>Aucun produit enregistré</p></div>`; return; }
        pl.innerHTML = "";
        products.forEach(p => {
          const item = document.createElement("div"); item.className = "item";
          item.innerHTML = `<div class="item-info"><div class="item-name">${p.name}</div><div class="item-details">${p.price} DH · ${formatDate(new Date(p.date))}</div></div><div class="item-actions"><button class="btn-danger" data-id="${p.id}" data-type="product"><i class="fas fa-trash-alt"></i> Supprimer</button></div>`;
          pl.appendChild(item);
        });
      }

      function renderCredits() {
        const cl = document.getElementById("creditList");
        if (!credits.length) { cl.innerHTML = `<div class="empty-state"><i class="fas fa-hand-holding-usd"></i><p>Aucun crédit enregistré</p></div>`; return; }
        cl.innerHTML = "";
        credits.forEach(c => {
          const item = document.createElement("div"); item.className = "item";
          item.innerHTML = `<div class="item-info"><div class="item-name">${c.borrower} — ${c.type}</div><div class="item-details">${c.amount} DH · ${formatDate(new Date(c.date))}</div></div><div class="item-actions"><button class="${c.paid ? 'btn-warning' : 'btn-success'}" data-id="${c.id}" data-type="credit" data-action="toggle"><i class="fas fa-${c.paid ? 'undo' : 'check'}"></i> ${c.paid ? 'Marquer impayé' : 'Marquer payé'}</button><button class="btn-danger" data-id="${c.id}" data-type="credit" data-action="delete"><i class="fas fa-trash-alt"></i> Supprimer</button></div><span class="badge ${c.paid ? 'badge-paid' : 'badge-pending'}"><i class="fas fa-${c.paid ? 'check-circle' : 'exclamation-circle'}"></i> ${c.paid ? 'Payé' : 'Impayé'}</span>`;
          cl.appendChild(item);
        });
      }

      function updateStats() {
        const ts = products.reduce((s,p) => s + parseFloat(p.price), 0);
        const tc = credits.reduce((s,c) => s + parseFloat(c.amount), 0);
        const pc = credits.reduce((s,c) => !c.paid ? s + parseFloat(c.amount) : s, 0);
        document.getElementById("totalSales").textContent = ts.toFixed(2) + " DH";
        document.getElementById("totalCredits").textContent = tc.toFixed(2) + " DH";
        document.getElementById("pendingCredits").textContent = pc.toFixed(2) + " DH";
      }

      function exportToPDF() {
        const doc = new jsPDF();
        doc.setFontSize(18); doc.setTextColor(40);
        doc.text("Rapport Commercial - " + formatDateForDisplay(currentDate), 105, 15, { align:"center" });
        doc.setFontSize(12); doc.setTextColor(100);
        doc.text(`Généré le: ${formatDate(new Date())}`, 105, 22, { align:"center" });
        doc.setFontSize(14); doc.setTextColor(40); doc.text("Détail des Ventes", 14, 35);
        doc.autoTable({ head:[["Produit","Prix","Date"]], body: products.map(p => [p.name, `${p.price} DH`, formatDate(new Date(p.date))]), startY:40, theme:"grid", headStyles:{fillColor:[41,128,185],textColor:255,fontStyle:"bold"}, alternateRowStyles:{fillColor:[245,245,245]} });
        doc.setFontSize(14); doc.text("Détail des Crédits", 14, doc.autoTable.previous.finalY + 20);
        doc.autoTable({ head:[["Client","Type","Montant","Statut","Date"]], body: credits.map(c => [c.borrower, c.type, `${c.amount} DH`, c.paid?"Payé":"Impayé", formatDate(new Date(c.date))]), startY: doc.autoTable.previous.finalY+25, theme:"grid", headStyles:{fillColor:[142,68,173],textColor:255,fontStyle:"bold"} });
        const tv = products.reduce((s,p) => s+parseFloat(p.price),0);
        const ci = credits.reduce((s,c) => !c.paid ? s+parseFloat(c.amount) : s, 0);
        doc.setFontSize(14); doc.text("Statistiques Globales", 14, doc.autoTable.previous.finalY + 20);
        doc.autoTable({ body:[["Total Ventes",`${tv.toFixed(2)} DH`],["Crédits Impayés",`${ci.toFixed(2)} DH`]], startY: doc.autoTable.previous.finalY+25, theme:"plain", styles:{fontSize:12,cellPadding:6}, columnStyles:{0:{fontStyle:"bold"},1:{fontStyle:"bold",halign:"right"}} });
        const yc = parseFloat(document.getElementById("yesterdayCash").value)||0, tc2 = parseFloat(document.getElementById("todayCash").value)||0, yd = parseFloat(document.getElementById("yesterdayDeler").value)||0;
        const ir = parseFloat(document.getElementById("inwiRecharge").value)||0, or2 = parseFloat(document.getElementById("orangeRecharge").value)||0, ia = parseFloat(document.getElementById("iamRecharge").value)||0;
        const ri = parseFloat(document.getElementById("remainingInwi").value)||0, ro = parseFloat(document.getElementById("remainingOrange").value)||0, rIAM = parseFloat(document.getElementById("remainingIAM").value)||0, rc = parseFloat(document.getElementById("remainingCashe").value)||0;
        const mr = document.getElementById("marginResult").textContent;
        doc.setFontSize(14); doc.text("Calcul de Marge", 14, doc.autoTable.previous.finalY + 20);
        doc.autoTable({ body:[["Fond caisse hier",`${yc.toFixed(2)} DH`],["Fond caisse aujourd'hui",`${tc2.toFixed(2)} DH`],["",""],["Dealers hier",`${yd.toFixed(2)} DH`],["Recharge Inwi",`${ir.toFixed(2)} DH`],["Recharge Orange",`${or2.toFixed(2)} DH`],["Recharge IAM",`${ia.toFixed(2)} DH`],["",""],["Reste Inwi",`${ri.toFixed(2)} DH`],["Reste Orange",`${ro.toFixed(2)} DH`],["Reste IAM",`${rIAM.toFixed(2)} DH`],["Total Dealers aujourd'hui",`${(ri+ro+rIAM).toFixed(2)} DH`],["","___________"],["Reste Argent",`${rc.toFixed(2)} DH`],["Marge Calculée", mr]], startY: doc.autoTable.previous.finalY+25, theme:"plain", styles:{fontSize:12,cellPadding:6}, columnStyles:{0:{fontStyle:"bold"},1:{fontStyle:"bold",halign:"right"}} });
        doc.setFontSize(10); doc.setTextColor(100);
        doc.text(`© ${new Date().getFullYear()} - Gestion Commerciale - M&M Mobile - Page ${doc.internal.getNumberOfPages()}`, 105, 285, { align:"center" });
        doc.save(`rapport_commercial_${formatDate(currentDate)}.pdf`);
        document.getElementById("backupStatus").textContent = "PDF généré avec succès - " + new Date().toLocaleString();
      }

      document.addEventListener("DOMContentLoaded", function() { loadDayData(currentDate); });
    </script>
  </body>
</html>
